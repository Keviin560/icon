name: Update Assets and README

on:
  push:
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-assets:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Generate JSON and Inject README
      env:
        CURRENT_REPO: ${{ github.repository }} 
        CURRENT_BRANCH: ${{ github.ref_name }}
      run: |
        node << 'EOF'
        const fs = require('fs');
        const path = require('path');

        const repo = process.env.CURRENT_REPO;
        const branch = process.env.CURRENT_BRANCH;
        
        if (!repo || !branch) {
          console.error("[Error] Could not detect repository context.");
          process.exit(1);
        }

        const rootDir = process.cwd();
        const srcDir = path.join(rootDir, 'src');
        const jsonPath = path.join(rootDir, 'icon.json');
        const readmePath = path.join(rootDir, 'README.md');

        console.log(`[Info] Scanning: ${srcDir}`);

        try {
          if (!fs.existsSync(srcDir)) {
             console.log("[Warn] No src directory found. Exiting cleanly.");
             process.exit(0);
          }

          const validExtensions = new Set(['.png', '.jpg', '.jpeg', '.svg', '.webp']);
          const files = fs.readdirSync(srcDir)
            .filter(file => validExtensions.has(path.extname(file).toLowerCase()))
            .sort();

          const iconsList = files.map(file => ({
            name: path.parse(file).name,
            url: `https://raw.githubusercontent.com/${repo}/${branch}/src/${encodeURIComponent(file)}`
          }));

          const finalOutput = {
            name: "自用图标集",
            description: `日常搜集的 1024*1024 高清图标，最后更新: ${new Date().toISOString().split('T')[0]}`,
            icons: iconsList
          };

          fs.writeFileSync(jsonPath, JSON.stringify(finalOutput, null, 2));
          console.log(`[Success] Generated JSON with ${iconsList.length} icons.`);

          // 动态 README 注入逻辑
          const rawSubscriptionUrl = `https://raw.githubusercontent.com/${repo}/${branch}/icon.json`;
          const readmeContent = `# Personal Resources\n\n> ⚠️Note: This is a personal asset repository for my configuration. Feel free to fork, but upstream changes may occur without notice.\n\n1024x1024 高清图标合集，源文件托管于 \`src/\` 目录，通过 GitHub Actions 自动构建索引分发。\n\n## 项目说明\n\n1. 图片存放：将 \`.png\` 等支持的图像文件直接推入 \`src/\` 目录。\n2. 自动流程：监听 \`src/**\` 变动，GitHub Actions 将在短时间内重写根目录的 \`icon.json\` 和 \`README.md\`。\n3. 订阅配置：远程直链：\n   \`${rawSubscriptionUrl}\`\n\n---\n\n### 拓扑结构\n\n\`\`\`text\n.\n├── src/             # 图标源文件\n├── icon.json        # CI 自动生成的标准 JSON 索引\n└── .github/         # 自动化工作流脚本\n\`\`\`\n`;

          fs.writeFileSync(readmePath, readmeContent);
          console.log(`[Success] Overwrote README.md with dynamic URL: ${rawSubscriptionUrl}`);
        
        } catch (error) {
          console.error('[Error]', error.message);
          process.exit(1);
        }
        EOF

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 捕捉所有变更（包括 json 和 md）
        if [[ -n $(git status --porcelain) ]]; then
          git add icon.json README.md
          git commit -m "chore(auto): build json and inject dynamic readme [skip ci]"
          git push
        else
          echo "No changes detected in artifacts."
        fi
